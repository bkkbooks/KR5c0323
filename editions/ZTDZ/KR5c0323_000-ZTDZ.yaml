front:
  text: 大丹鉛汞論
  hash: sha256:42471e76c469f655ebf6af117259b6229b5414592cb1a4588e4aa8f3eb063dda
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0323_SJB_000-190288b, image: sjb/19/190288b.png}
body:
  text: 唐金竹坡著第一夫大丹之術出乎鉛汞而鉛汞之藥乃大丹之基觀其互換感發之機交相制伏之妙皆岀乎天地自然非人力所能致也且鉛屬隂黑色而爲玄武其卦爲坎位屬北方壬癸之水水能生金水中有金其色白而爲白虎具卦爲兊西方庚辛金也汞屬陽色青而爲青龍其卦爲震位稟東方甲乙之木木能生火故砂中有汞其色赤而爲朱雀其卦爲離南方丙丁火也以是論之則坎爲水爲月爲鉛離爲火爲日爲汞當無一毫之差可也僕每至半途而悔中道而廢復參異人乃曰天生於坎地生於離坎屬水爲月爲鉛離屬火爲日爲汞坎離互用曰月相交鉛汞相持虎龍相返然後相成僕遂先以水鉛而制離汞後以離汞爲眞鉛復以眞鉛制汞魂而爲眞汞然則外丹得造化之大全由是始悟五行顚倒術龍從火裏出五行不順行虎向水中生丹經言不妄發吁以鉛制汞得汞中之寳而汞伏於鉛得水中之金而鉛始見以鉛制汞以汞制丹曰鉛曰汞不偏其用曰汞曰鉛不専具用鉛汞制伏黄婆㑹遇外丹夫何逺之有第二採取眞鉛眞汞以淨鉛八兩取山澤銀四兩投入鉛内鎔搧取花得八兩謂之鉛黄花朱砂八兩同研細入神鼎水火打經三轉自然眞死爲大丹之基汞脱無窮之寳第三結法黑鉛取花於山澤名曰鉛黄花白虎丹經爲水中金是也朱砂取汞於水火名曰玉液位居青龍丹經爲砂中汞是也石水中金砂中汞合爲一處各用八兩以體乾坤之妙和合匹配同歸神鼎封固牢宻埋入神爐水火旣濟運用抽添鉛得汞而降汞得鉛而伏乃爲龍虎大丹再歸土釡脫養辰砂增添無極三七四六感炁白雪黄芽皆自鉛汞中産張眞人曰不識眞鉛正祖宗萬般作用枉施功鐘離先生曰抱太一之炁爲八石之首者朱砂也砂中有汞汞乃砂之子也抱太一之炁爲五金之首者鉛也鉛中有銀銀乃鉛之子也難取者鉛中銀易取者砂中汞鉛汞相合煆鍊成至寳此神仙簡秘之妙得此者無忽焉第四三姓會於元宫母砂靈砂朱砂謂之三姓用母砂包靈砂入鉛黄太乙匱養死次以靈砂包朱砂又以母砂包靈砂入鉛黄太乙匱内養七曰母在靈在朱在謂之三在混而爲一謂之四象乃神仙之秘法爲世上之至珍第五三姓再㑹生靈砂包朱砂用母砂包在外入四象匱内養七日三姓再死研細增添無有紀極第六白雪化生粉霜四兩生雄貼身入大匱末内養七日其粉眞死雪白可愛此粉有大功乾汞點化無施不可第七白雪變黄粉白雪取乾眞寳碎爲白屑上火下水旣濟未濟鍊養色變如黄粉見火成汁傾岀成膏其味甜有回陽起死之功糝制成功之妙第八鉛黄信轉爲大寳用凈鉛一斤銀半斤合鎔成汁入信半斤投之良乆取出坐鍋放冷打碎此信一陀分胎去鉛銀以信爲末與朱對勾入水火鼎内打死信在上朱在底此朱有大藥之基須是煎去折半其藥方靈可爲蓋頭第九鍊養鉛汞大丹鉛坑至寳形如布線者八兩乃老翁鬚是也攬爲碎屑以砂合貯之入汞八兩鍊養四十九伏自然化爲丹粉𤇨之成丹不復成寳此可爲大匱養辰砂轉制四神爲大丹一秘用神仙三丹妙訣山澤至寳一十六兩山澤先天太乙一十二兩同入甘鍋煎鉛黄半斤爲末作匱將朱五兩逐旋於中脱死爲末靈砂五兩作一陀以死朱五兩貼了外用四六母砂一斤包令固宻再以鉛白霜死大凡包褁外墻築入油缸固濟了畢用養七日一煆寒取出其朱靈母砂杵爲末作大匱此爲一秘也二秘山澤鉛銀煎取黄花半斤先將母砂一斤逐塊包褁朱砂逐漸養死剥去母砂次以朱砂靈砂對停包褁逐漸於黄花匱末内養死取出搗爲一處以成大匱此二秘也三秘依前黄花半斤將靈砂四兩逐漸於内養死却將死靈砂與硃對停爲末煆作一陀外以四六母砂一片包褁黄花匱内養令眞死與母混而爲一以作大匱此謂之三秘也夫是三秘乃大洞眞訣皆以凡鉛死汞爲眞鉛以眞鉛死朱爲眞汞鉛汞一處合鍊養嬰兒靈中之靈聖中之聖也脫養嬰兒夫嬰兒姹女雖同其源實易其體姹女者未結胎嬰兒者巳結秀嬰兒旣産能神能聖能通能變運用無方變化莫測在天爲白雪在世爲鉛壷在人則爲粉霜神仙比之爲姹女不過一水銀爾以其産朱砂之腹爲汞之精砂之炁攪之不濁澄之不清竟在髙山裂石不能碍其形柔和明淨糠粃不能汙其質此爲長生之藥點化之珍世之至寳無可比倫凡夫濁質不明造化之根不遇神仙之訣乃欲其成乾汞至寳以歸一身之所用以縱一己之私欲何其不自揣量然人欲求其訣當先㝷師欲得其方先修其行察隂陽之動靜驗天地之循環明辯藥材扣求水火法參稽互考徧閱丹經㝷訪明師直與天地同其軌轍與内丹同其關鍵可不秘乎泄之非人罪及七祖矣脱養粉霜成大藥粉霜四兩入銀末一兩同研勻入油缸内上以前三洞藥丹末捺頭用黄土末作蓋封固堅牢用火四兩煆養五日五夜次取出粉霜再研細銀薄捲作筒子入粉在内捲褁令緊入三洞丹頭中養之三七日此粉有大功可作大丹轉糝之法外丹大乗濟物利人肥身養道甞聞異人曰天盜地地盜人人盜萬物三才相盜之道外丹之術莫不由是乎外丹以鉛爲祖以銀爲母以汞爲婦鉛盜天之炁銀盜鉛之炁汞盜銀之炁互相盜竊其理一也其外丹欲以變化生生而不窮非得此三才相吞相盜交和之理其何以知外丹相生相養相吞相合之妙也且夫外丹之術與天地造化初無少異大丹以鉛爲祖以銀爲母以汞爲婦以鉛用銀是感先天一元之炁也去鉛用銀以銀養汞是感後天銀母之炁也汞旣以死爲鉛故謂之眞鉛由是以知汞之盜銀子之盜母其理與天之盜地地之盜人而有感異之說乎眞鉛旣死得所謂之眞汞又果何物耶殊不知汞者即感後天之炁而生也未經煆鍊故謂之眞汞能将眞鉛杵爲細末又將眞汞混而爲一復求朱砂而養之則鉛汞相合隂陽配匹互相鍊養而可謂之鉛汞眞死之藥耶汞旣巳死母炁散耗不言可知至此須明其形神俱妙與道合眞之理方與天地造化異事而同其源是故銀者汞之母形者神之舍神歸乎舍形神合一鉛交其汞汞死爲鉛銀與鉛合子與母㑹不相分離不相間隔所謂和合四象得外丹大全之用矣且四象五行不可缺于一此一者何也土也土者何也硫黄是也黄婆也黄芽也丹經曰雖用黄婆作媒禮又曰反鉛爲黄芽也又水銀爲眞汞又曰灰池炎灼鉛汞成銀潔白見寳可造黄金若是眞死鉛汞二兩煎岀聖銀正丹經所謂反汞爲黄茅依前脱養出硃砂正所謂反水銀爲眞汞反還之妙不容於不知然則道家何以曰順則成人逆則成道以銀養硃則銀折全在乎貼身以砂養砂則耗折以砂澆汞則砂活雖千百載亦無成功謂其孤隂不能自生孤陽不能自成世之用銀則銀折所幸有汞則益其銀世之用砂則砂脱所幸有硫以固其汞銀無耗散汞精不飛以銀養汞投胎奪舍返本還元再煆黄婆以爲媒禮何謂無成功之效乎古賢有云不得硃硫汞不乾鉛無硃硫汞不耐正所謂歟蓋鉛汞者日月之精出於天而光照四表日月之光着乎山澤而五金生焉八石産焉珠玉結焉光者何也精神之發現也丹者何也鉛汞眞精感化而爲還丹者也丹乆而光光而明由是黄白生焉衆寳出焉曰乾汞曰㸃化皆由此丹而岀凡世之謂感氣母砂澆淋皆自此出此丹之生也雖然黄白之術此特神仙之餘事爾人能於服餌尅意於内庭而上之遂使此心立於無患之壽域臻於長生之藥地此僕之所以拳拳於同道之士也大丹鉛汞論
